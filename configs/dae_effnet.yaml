# ============================================================
# U-Net EfficientNet-B4 DAE Configuration
# ============================================================
_base_: "default.yaml"

# Model
model:
  name: "unet_effnet"
  encoder_name: "efficientnet-b4"
  encoder_weights: "imagenet"
  num_classes: 8

# Training
training:
  batch_size: 4
  epochs: 100
  lr: 1.0e-4
  weight_decay: 1.0e-4
  optimizer: "adamw"
  scheduler: "cosine"
  patience: 15

# Loss
loss:
  ce_weight: 1.0
  dice_weight: 1.0
  boundary_weight: 0.5

# Data augmentation
augment: true
